<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- background -->
  <rect width="180" height="180" rx="40" fill="#070707"/>
  <!-- scanlines subtle -->
  <rect x="0" y="20" width="180" height="1" fill="#0b0b0b"/>
  <rect x="0" y="40" width="180" height="1" fill="#0b0b0b"/>
  <rect x="0" y="60" width="180" height="1" fill="#0b0b0b"/>
  <rect x="0" y="80" width="180" height="1" fill="#0b0b0b"/>
  <rect x="0" y="100" width="180" height="1" fill="#0b0b0b"/>
  <rect x="0" y="120" width="180" height="1" fill="#0b0b0b"/>
  <rect x="0" y="140" width="180" height="1" fill="#0b0b0b"/>
  <rect x="0" y="160" width="180" height="1" fill="#0b0b0b"/>
  <!-- title bar -->
  <rect x="0" y="0" width="180" height="44" rx="40" fill="#0f0f0f"/>
  <rect x="0" y="22" width="180" height="22" fill="#0f0f0f"/>
  <!-- traffic lights -->
  <circle cx="28" cy="22" r="8" fill="#ff5f57"/>
  <circle cx="54" cy="22" r="8" fill="#ffbd2e"/>
  <circle cx="80" cy="22" r="8" fill="#28c840"/>
  <!-- divider -->
  <rect x="0" y="44" width="180" height="1" fill="#1a1a1a"/>
  <!-- SJE neon glow layer -->
  <text x="90" y="128" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="72" font-weight="900" fill="#39ff6e" opacity="0.15" filter="url(#glow)">SJE</text>
  <!-- SJE main -->
  <text x="90" y="128" text-anchor="middle" font-family="'Courier New',Courier,monospace" font-size="72" font-weight="900" fill="#39ff6e">SJE</text>
  <!-- cursor -->
  <rect x="18" y="138" width="14" height="18" rx="2" fill="#39ff6e" opacity="0.85"/>
  <!-- bottom bar -->
  <rect x="0" y="158" width="180" height="22" rx="0" fill="#0c0c0c"/>
  <rect x="0" y="158" width="180" height="22" rx="40" fill="#0c0c0c"/>
  <rect x="0" y="158" width="180" height="11" fill="#0c0c0c"/>
  <text x="16" y="173" font-family="'Courier New',Courier,monospace" font-size="11" fill="#2a2a2a">cashflow.sh</text>
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
</svg>