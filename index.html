<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cash Flow — May–Aug 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg:#12112a;--bg2:#1a1833;--bg3:#22204a;--border:#2a2750;--border2:#363260;
    --text:#eeeeff;--text2:#8885b8;--text3:#44426a;
    --teal:#34d399;--purple:#8b5cf6;--red:#f87171;--amber:#fbbf24;--blue:#60a5fa;--violet:#a78bfa;--accent:#c4f135;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;font-size:12px;min-height:100vh;padding:0;overflow-x:hidden;}
  .topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;}
  .topbar-left{display:flex;align-items:center;gap:10px;}
  .logo-dot{width:8px;height:8px;border-radius:50%;background:var(--teal);box-shadow:0 0 8px var(--teal);animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(0.8)}}
  .topbar-title{font-family:'Cabinet Grotesk',sans-serif;font-size:15px;font-weight:800;letter-spacing:-.02em;}
  .topbar-period{font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .save-status{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:5px;transition:color .3s;}
  .save-status.saved{color:var(--teal);}
  .save-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
  .sync-btn{font-size:11px;font-family:'DM Mono',monospace;padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:5px;}
  .sync-btn:hover{border-color:var(--teal);color:var(--teal);background:rgba(52,211,153,.08);}
  .sync-btn.syncing{color:var(--blue);border-color:rgba(110,180,255,.3);animation:spin 1s linear infinite;}
  .sync-btn.synced{color:var(--teal);border-color:rgba(52,211,153,.3);}
  @keyframes spin{to{transform:rotate(360deg)}}
  .jason-pill{display:flex;align-items:center;gap:6px;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:20px;padding:4px 10px;}
  .jason-dot{width:5px;height:5px;border-radius:50%;background:var(--red);}
  .jason-label{font-size:10px;color:var(--text2);}
  .jason-val{font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--red);}
  .main{padding:16px;max-width:520px;margin:0 auto;}
  .summary-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
  .summary-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden;transition:border-color .2s;}
  .summary-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--teal),transparent);opacity:0;transition:opacity .3s;}
  .summary-card:hover::before{opacity:1;}
  .summary-card.full{grid-column:span 2;background:rgba(52,211,153,.05);border-color:rgba(52,211,153,.15);}
  .summary-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;}
  .summary-value{font-family:'Cabinet Grotesk',sans-serif;font-size:22px;font-weight:800;letter-spacing:-.02em;}
  .summary-sub{font-size:10px;color:var(--text3);margin-top:2px;}
  .pos{color:var(--teal);}
  .neg{color:var(--red);}
  .balance-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:18px;}
  .balance-month{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;text-align:center;}
  .balance-month.active{border-color:rgba(52,211,153,.3);background:rgba(52,211,153,.05);}
  .bm-label{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.06em;}
  .bm-val{font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:700;}
  .chart-section{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:18px;}
  .chart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .chart-title{font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.02em;}
  .chart-legend{display:flex;gap:12px;font-size:10px;color:var(--text3);}
  .chart-legend span{display:flex;align-items:center;gap:4px;}
  .lsq{width:7px;height:7px;border-radius:2px;}
  .chart-wrap{height:180px;position:relative;}
  .debt-section{margin-bottom:18px;}
  .section-title{font-family:'Cabinet Grotesk',sans-serif;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
  .debt-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;margin-bottom:6px;}
  .debt-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
  .debt-name{font-family:'Cabinet Grotesk',sans-serif;font-size:13px;font-weight:700;}
  .debt-amounts{font-size:11px;color:var(--text2);}
  .debt-amounts span{color:var(--teal);}
  .progress-track{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden;}
  .progress-fill{height:100%;border-radius:3px;transition:width .6s cubic-bezier(.4,0,.2,1);}
  .debt-footer{display:flex;justify-content:space-between;margin-top:6px;font-size:10px;color:var(--text3);}
  .month-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;overflow:hidden;margin-bottom:8px;transition:border-color .2s,box-shadow .2s;}
  .month-card.expanded{border-color:var(--border2);box-shadow:0 4px 24px rgba(0,0,0,.4);}
  .month-header{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;cursor:pointer;user-select:none;}
  .month-indicator{width:3px;height:28px;border-radius:2px;background:var(--border2);transition:all .3s;}
  .month-card.expanded .month-indicator{background:var(--teal);box-shadow:0 0 8px var(--teal);}
  .month-name{font-family:'Cabinet Grotesk',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.02em;}
  .month-badge{font-size:10px;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace;}
  .badge-green{background:rgba(52,211,153,.1);color:var(--teal);border:1px solid rgba(52,211,153,.2);}
  .badge-red{background:rgba(248,113,113,.1);color:var(--red);border:1px solid rgba(248,113,113,.2);}
  .month-net{font-family:'Cabinet Grotesk',sans-serif;font-size:16px;font-weight:800;letter-spacing:-.02em;}
  .chevron{color:var(--text3);font-size:10px;transition:transform .25s;}
  .month-card.expanded .chevron{transform:rotate(180deg);}
  .month-body{display:none;padding:0 16px 14px;border-top:1px solid var(--border);}
  .month-body.open{display:block;}
  .sec-header{display:flex;align-items:center;justify-content:space-between;margin:14px 0 8px;}
  .sec-label{font-size:10px;text-transform:uppercase;letter-spacing:.1em;font-weight:500;}
  .sec-add-btn{font-size:10px;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:20px;border:1px solid var(--border2);background:transparent;color:var(--text3);cursor:pointer;transition:all .15s;}
  .sec-add-btn:hover{border-color:var(--teal);color:var(--teal);background:rgba(52,211,153,.05);}
  .field-row{display:flex;align-items:center;gap:5px;margin-bottom:5px;animation:slideIn .15s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
  .rm-btn{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text3);cursor:pointer;background:none;border:1px solid transparent;border-radius:4px;transition:all .15s;flex-shrink:0;}
  .rm-btn:hover{color:var(--red);border-color:rgba(248,113,113,.3);background:rgba(248,113,113,.08);}
  .field-label-input{flex:1;font-size:12px;font-family:'DM Mono',monospace;padding:5px 8px;border-radius:6px;border:1px solid transparent;background:transparent;color:var(--text2);transition:all .15s;min-width:0;}
  .field-label-input:hover{border-color:var(--border2);background:var(--bg3);}
  .field-label-input:focus{outline:none;border-color:var(--border2);background:var(--bg3);color:var(--text);}
  .field-input{width:82px;font-size:12px;font-family:'DM Mono',monospace;padding:5px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);text-align:right;transition:all .15s;flex-shrink:0;}
  .field-input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 2px rgba(52,211,153,.1);}
  .net-row{display:flex;justify-content:space-between;align-items:center;font-family:'Cabinet Grotesk',sans-serif;font-size:14px;font-weight:800;margin-top:12px;padding-top:11px;border-top:1px solid var(--border2);}
  .net-label{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;font-weight:400;letter-spacing:.06em;text-transform:uppercase;}
  .notes-area{margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
  .notes-input{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:6px;color:var(--text2);font-family:'DM Mono',monospace;font-size:11px;padding:7px 10px;resize:none;min-height:50px;transition:all .15s;line-height:1.6;}
  .notes-input:focus{outline:none;border-color:var(--teal);color:var(--text);}
  .notes-input::placeholder{color:var(--text3);}
  .footer{padding:16px 18px 28px;text-align:center;font-size:10px;color:var(--text3);letter-spacing:.06em;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:var(--bg);}
  ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:8px 18px;font-size:12px;color:var(--text2);transition:transform .3s cubic-bezier(.4,0,.2,1),opacity .3s;opacity:0;z-index:999;white-space:nowrap;}
  .toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .toast.green{color:var(--teal);border-color:rgba(52,211,153,.2);}
  .toast.red{color:var(--red);border-color:rgba(248,113,113,.2);}
  .loading-overlay{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:12px;}
  .loading-dot{width:10px;height:10px;border-radius:50%;background:var(--teal);box-shadow:0 0 12px var(--teal);animation:pulse 1s infinite;}
  .loading-text{font-size:12px;color:var(--text3);letter-spacing:.08em;}
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-dot"></div>
  <div class="loading-text">SYNCING FROM DATABASE...</div>
</div>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <div>
      <div class="topbar-title">Cash Flow</div>
      <div class="topbar-period">May — Aug 2026</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="save-status" id="saveStatus">
      <span class="save-dot"></span>
      <span id="saveText">loading...</span>
    </div>
    <button class="sync-btn" id="syncBtn" onclick="saveToSupabase()">⬆ Save</button>
    <div class="jason-pill">
      <div class="jason-dot"></div>
      <span class="jason-label">Jason</span>
      <span class="jason-val">$51,550</span>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="main">
  <div class="summary-row" id="summaryGrid"></div>
  <div class="section-title" style="margin-bottom:8px;">Running balance</div>
  <div class="balance-strip" id="balanceStrip"></div>
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title">Monthly flow</div>
      <div class="chart-legend">
        <span><span class="lsq" style="background:var(--teal);"></span>In</span>
        <span><span class="lsq" style="background:var(--red);"></span>Out</span>
        <span><span class="lsq" style="background:var(--blue);"></span>Net</span>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="cfChart"></canvas></div>
  </div>
  <div class="debt-section">
    <div class="section-title">Debt payoff tracker</div>
    <div id="debtCards"></div>
  </div>
  <div>
    <div class="section-title">Monthly breakdown</div>
    <div id="monthsContainer"></div>
  </div>
</div>
<div class="footer">synced via supabase · changes save across all devices</div>

<script>
const SUPABASE_URL = "https://qktdmqbctocmaatdtngg.supabase.co"
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFrdGRtcWJjdG9jbWFhdGR0bmdnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg4ODg4MjcsImV4cCI6MjA5NDQ2NDgyN30.p5UlRyeAUITU_L0XS-I7pWcl5wWOk08CU1i9WlCuXpw"

const MONTHS = ["May","Jun","Jul","Aug"]
const BADGES = ["Payout month","Beto cleared","Kris cleared","Reinvest returns"]

const DEFAULT = {
  income: [
    [{label:"Juan payouts (25th)",val:7300},{label:"$16,670 draw #1",val:1500}],
    [{label:"Juan reinvest return",val:6000},{label:"$16,670 draw #2",val:1500}],
    [{label:"$16,670 draw #3",val:1500},{label:"$16,670 profit remainder",val:3170},{label:"Kris payment",val:2000}],
    [{label:"$27k installment #1",val:3000},{label:"Kris full payout",val:4000}],
  ],
  obligations: [
    [{label:"Jason",val:1500},{label:"Beto",val:1200},{label:"Anthony V x2",val:500},{label:"Reinvest into Juan",val:3000}],
    [{label:"Jason x2",val:3000},{label:"Beto",val:1800},{label:"Kris",val:1300},{label:"Anthony V x2",val:500}],
    [{label:"Jason x2",val:3000},{label:"Beto final",val:380},{label:"Kris final",val:1700},{label:"Anthony V x2",val:500}],
    [{label:"Jason x2",val:3000},{label:"Anthony V x2",val:500}],
  ],
  notes: ["","","",""],
  open: [false,false,false,false],
}

let state = JSON.parse(JSON.stringify(DEFAULT))

// ── SUPABASE ──
async function sbFetch(endpoint, options) {
  const res = await fetch(SUPABASE_URL + "/rest/v1/" + endpoint, {
    ...options,
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(options && options.headers || {})
    }
  })
  if (!res.ok) throw new Error("Supabase error: " + res.status)
  const text = await res.text()
  return text ? JSON.parse(text) : null
}

async function loadFromSupabase() {
  try {
    const rows = await sbFetch("cashflow?key=eq.state&select=value", { method: "GET" })
    if (rows && rows.length > 0 && rows[0].value) {
      const saved = rows[0].value
      state.income = saved.income || DEFAULT.income
      state.obligations = saved.obligations || DEFAULT.obligations
      state.notes = saved.notes || DEFAULT.notes
      state.open = saved.open || DEFAULT.open
      showToast("Loaded from database", "green")
    } else {
      await saveToSupabase()
    }
  } catch(e) {
    showToast("Using local data", "")
  }
  document.getElementById("loadingOverlay").style.display = "none"
  buildMonths()
  refresh()
}

async function saveToSupabase() {
  const btn = document.getElementById("syncBtn")
  btn.className = "sync-btn syncing"
  btn.textContent = "..."
  const saveEl = document.getElementById("saveStatus")
  const saveTxt = document.getElementById("saveText")

  try {
    const payload = {
      key: "state",
      value: {
        income: state.income,
        obligations: state.obligations,
        notes: state.notes,
        open: state.open,
      }
    }

    const existing = await sbFetch("cashflow?key=eq.state", { method: "GET" })

    if (existing && existing.length > 0) {
      await sbFetch("cashflow?key=eq.state", {
        method: "PATCH",
        body: JSON.stringify({ value: payload.value })
      })
    } else {
      await sbFetch("cashflow", {
        method: "POST",
        body: JSON.stringify(payload)
      })
    }

    btn.className = "sync-btn synced"
    btn.textContent = "Saved"
    saveEl.classList.add("saved")
    saveTxt.textContent = "saved " + new Date().toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})
    showToast("Saved — all devices synced", "green")
    setTimeout(() => {
      btn.className = "sync-btn"
      btn.innerHTML = "Up Save"
      saveEl.classList.remove("saved")
      saveTxt.textContent = "synced"
    }, 3000)
  } catch(e) {
    btn.className = "sync-btn"
    btn.innerHTML = "Up Save"
    showToast("Save failed — check connection", "red")
  }
}

// ── TOAST ──
function showToast(msg, type) {
  const t = document.getElementById("toast")
  t.textContent = msg
  t.className = "toast show " + (type||"")
  setTimeout(() => { t.className = "toast " + (type||"") }, 2500)
}

// ── MATH ──
function fmt(n) { return (n<0?"-$":"$")+Math.abs(Math.round(n)).toLocaleString() }
function monthIncome(i) { return state.income[i].reduce((s,x)=>s+(parseFloat(x.val)||0),0) }
function monthObl(i) { return state.obligations[i].reduce((s,x)=>s+(parseFloat(x.val)||0),0) }
function monthNet(i) { return monthIncome(i)-monthObl(i) }
function runningBalance() { let b=0; return MONTHS.map((_,i)=>{b+=monthNet(i);return b;}) }

// ── CHART ──
let chart
function buildChart() {
  const inc=MONTHS.map((_,i)=>Math.round(monthIncome(i)))
  const obl=MONTHS.map((_,i)=>Math.round(monthObl(i)))
  const net=MONTHS.map((_,i)=>Math.round(monthNet(i)))
  if(chart){
    chart.data.datasets[0].data=inc
    chart.data.datasets[1].data=obl.map(v=>-v)
    chart.data.datasets[2].data=net
    chart.update("none")
  } else {
    const ctx=document.getElementById("cfChart").getContext("2d")
    const g=ctx.createLinearGradient(0,0,0,180)
    g.addColorStop(0,"rgba(52,211,153,.2)")
    g.addColorStop(1,"rgba(52,211,153,.02)")
    chart=new Chart(ctx,{
      type:"bar",
      data:{labels:MONTHS,datasets:[
        {label:"Income",data:inc,backgroundColor:"rgba(52,211,153,.18)",borderColor:"#34d399",borderWidth:1,borderRadius:5,stack:"a"},
        {label:"Obligations",data:obl.map(v=>-v),backgroundColor:"rgba(248,113,113,.18)",borderColor:"#f87171",borderWidth:1,borderRadius:5,stack:"b"},
        {label:"Net",data:net,type:"line",borderColor:"#60a5fa",backgroundColor:g,borderWidth:2.5,pointRadius:5,pointBackgroundColor:"#60a5fa",pointBorderColor:"#12112a",pointBorderWidth:2,fill:true,tension:.3},
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false},tooltip:{backgroundColor:"#1a1833",borderColor:"#2a2750",borderWidth:1,titleColor:"#8885b8",bodyColor:"#eeeeff",padding:10,callbacks:{label:ctx=>"  "+ctx.dataset.label+": "+fmt(ctx.parsed.y)}}},
        scales:{
          x:{ticks:{color:"#44426a",font:{family:"DM Mono",size:11}},grid:{color:"#1a1833"}},
          y:{ticks:{color:"#44426a",font:{family:"DM Mono",size:10},callback:v=>(v<0?"-$":"$")+Math.abs(Math.round(v/1000))+"k"},grid:{color:"#1a1833"}}
        }
      }
    })
  }
}

// ── SUMMARY ──
function buildSummary() {
  const totalIn=MONTHS.reduce((s,_,i)=>s+monthIncome(i),0)
  const totalOut=MONTHS.reduce((s,_,i)=>s+monthObl(i),0)
  const net=totalIn-totalOut
  document.getElementById("summaryGrid").innerHTML=`
    <div class="summary-card"><div class="summary-label">Total in</div><div class="summary-value pos">${fmt(totalIn)}</div><div class="summary-sub">across 4 months</div></div>
    <div class="summary-card"><div class="summary-label">Total out</div><div class="summary-value neg">${fmt(totalOut)}</div><div class="summary-sub">obligations</div></div>
    <div class="summary-card full"><div class="summary-label">4-month net</div><div class="summary-value ${net>=0?"pos":"neg"}">${fmt(net)}</div><div class="summary-sub">${net>=0?"after all obligations":"deficit"}</div></div>
  `
}

// ── BALANCE ──
function buildBalance() {
  const bals=runningBalance()
  const strip=document.getElementById("balanceStrip")
  strip.innerHTML=""
  bals.forEach((bal,i)=>{
    const d=document.createElement("div")
    d.className="balance-month"+(i===bals.length-1?" active":"")
    d.innerHTML=`<div class="bm-label">${MONTHS[i]}</div><div class="bm-val ${bal>=0?"pos":"neg"}">${fmt(bal)}</div>`
    strip.appendChild(d)
  })
}

// ── DEBT ──
function buildDebtTracker() {
  const container=document.getElementById("debtCards")
  container.innerHTML=""
  const debts=[
    {name:"Beto",total:3380,payments:[1200,1800,380,0],color:"#fbbf24",cleared:"Jul"},
    {name:"Kris",total:3000,payments:[0,1300,1700,0],color:"#a78bfa",cleared:"Jul"},
    {name:"Anthony V",total:4250,payments:[500,500,500,500],color:"#60a5fa",cleared:"Jan 2027"},
    {name:"Jason",total:73050,payments:[1500,3000,3000,3000],color:"#f87171",cleared:"~2 yrs"},
  ]
  debts.forEach(d=>{
    const paid=d.payments.reduce((s,x)=>s+x,0)
    const pct=Math.min((paid/d.total)*100,100)
    const remaining=Math.max(d.total-paid,0)
    const card=document.createElement("div")
    card.className="debt-card"
    card.innerHTML=`
      <div class="debt-row"><div class="debt-name" style="color:${d.color}">${d.name}</div><div class="debt-amounts">${fmt(paid)} paid · <span>${fmt(remaining)} left</span></div></div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${d.color};box-shadow:0 0 6px ${d.color}55;"></div></div>
      <div class="debt-footer"><span>${Math.round(pct)}% complete</span><span>clears ${d.cleared}</span></div>
    `
    container.appendChild(card)
  })
}

// ── ROWS ──
function makeRow(item,onLabel,onVal,onRemove) {
  const row=document.createElement("div"); row.className="field-row"
  const rm=document.createElement("button"); rm.className="rm-btn"; rm.textContent="x"
  rm.addEventListener("click",e=>{e.stopPropagation();onRemove();})
  const li=document.createElement("input"); li.className="field-label-input"; li.type="text"; li.value=item.label; li.placeholder="Label..."
  li.addEventListener("input",()=>onLabel(li.value))
  li.addEventListener("click",e=>e.stopPropagation())
  const vi=document.createElement("input"); vi.className="field-input"; vi.type="number"; vi.value=Math.round(item.val); vi.step=1
  vi.addEventListener("input",()=>{onVal(parseFloat(vi.value)||0);refresh();})
  vi.addEventListener("click",e=>e.stopPropagation())
  row.appendChild(rm); row.appendChild(li); row.appendChild(vi)
  return row
}

function buildSection(bodyEl,monthIdx,type) {
  const arr=state[type][monthIdx]
  const isIncome=type==="income"
  const sh=document.createElement("div"); sh.className="sec-header"
  const sl=document.createElement("div"); sl.className="sec-label"; sl.style.color=isIncome?"var(--teal)":"var(--red)"; sl.textContent=isIncome?"Income":"Obligations"
  const ab=document.createElement("button"); ab.className="sec-add-btn"; ab.textContent="+ add row"
  ab.addEventListener("click",e=>{e.stopPropagation();arr.push({label:"New item",val:0});rebuildBody(monthIdx);refresh();})
  sh.appendChild(sl); sh.appendChild(ab); bodyEl.appendChild(sh)
  arr.forEach((item,j)=>{
    bodyEl.appendChild(makeRow(item,v=>arr[j].label=v,v=>arr[j].val=v,()=>{arr.splice(j,1);rebuildBody(monthIdx);refresh();}))
  })
}

function rebuildBody(i) {
  const body=document.getElementById("body-"+i)
  if(!body) return
  const wasOpen=body.classList.contains("open")
  body.innerHTML=""
  buildSection(body,i,"income")
  buildSection(body,i,"obligations")
  const na=document.createElement("div"); na.className="notes-area"
  const ni=document.createElement("textarea"); ni.className="notes-input"; ni.placeholder="Notes for this month..."; ni.value=state.notes[i]||""
  ni.addEventListener("input",e=>{state.notes[i]=e.target.value;})
  ni.addEventListener("click",e=>e.stopPropagation())
  na.appendChild(ni); body.appendChild(na)
  const nr=document.createElement("div"); nr.className="net-row"; nr.id="net-"+i
  body.appendChild(nr)
  if(wasOpen) body.classList.add("open")
  updateNets()
}

function buildMonths() {
  const container=document.getElementById("monthsContainer"); container.innerHTML=""
  MONTHS.forEach((month,i)=>{
    const net=monthNet(i)
    const card=document.createElement("div"); card.className="month-card"+(state.open[i]?" expanded":""); card.id="mcard-"+i
    const header=document.createElement("div"); header.className="month-header"
    header.innerHTML=`
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="month-indicator"></div>
        <div class="month-name">${month}</div>
        <span class="month-badge ${net>=0?"badge-green":"badge-red"}">${BADGES[i]}</span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <span class="month-net ${net>=0?"pos":"neg"}" id="hnet-${i}">${fmt(net)}</span>
        <span class="chevron" id="chev-${i}">v</span>
      </div>
    `
    header.addEventListener("click",()=>{
      state.open[i]=!state.open[i]
      document.getElementById("body-"+i).classList.toggle("open",state.open[i])
      card.classList.toggle("expanded",state.open[i])
    })
    card.appendChild(header)
    const body=document.createElement("div"); body.className="month-body"+(state.open[i]?" open":""); body.id="body-"+i
    card.appendChild(body); container.appendChild(card)
    rebuildBody(i)
  })
}

function updateNets() {
  MONTHS.forEach((_,i)=>{
    const n=monthNet(i); const cls=n>=0?"pos":"neg"
    const el=document.getElementById("net-"+i)
    if(el) el.innerHTML=`<span class="net-label">Net</span><span class="${cls}">${fmt(n)}</span>`
    const hnet=document.getElementById("hnet-"+i)
    if(hnet){hnet.textContent=fmt(n);hnet.className="month-net "+cls;}
  })
}

function refresh() { buildSummary(); buildBalance(); buildChart(); buildDebtTracker(); updateNets(); }

// ── INIT ──
loadFromSupabase()
</script>
