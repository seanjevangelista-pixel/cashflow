<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Cash Flow — May–Aug 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root {
    --bg: #080a09;
    --bg2: #0f110f;
    --bg3: #151815;
    --bg4: #1c1f1c;
    --border: #1e221e;
    --border2: #272b27;
    --text: #eceeed;
    --text2: #7a8079;
    --text3: #404540;
    --green: #5dfc8d;
    --green-dim: #0d2b1a;
    --green-glow: rgba(93,252,141,0.12);
    --red: #ff6b6b;
    --red-dim: #2d1010;
    --blue: #6eb4ff;
    --accent: #c4f135;
    --accent-dim: rgba(196,241,53,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    min-height: 100vh;
    padding: 0;
    line-height: 1.5;
    overflow-x: hidden;
  }
  .topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 10px; }
  .logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.6; transform:scale(0.85); }
  }
  .topbar-title { font-family:'Cabinet Grotesk',sans-serif; font-size:15px; font-weight:800; letter-spacing:-0.02em; }
  .topbar-period { font-size:10px; color:var(--text3); letter-spacing:0.08em; text-transform:uppercase; }
  .topbar-right { display:flex; align-items:center; gap:8px; }
  .jason-pill {
    display:flex; align-items:center; gap:6px;
    background:var(--red-dim); border:1px solid rgba(255,107,107,0.2);
    border-radius:20px; padding:4px 10px;
  }
  .jason-dot { width:5px; height:5px; border-radius:50%; background:var(--red); }
  .jason-label { font-size:10px; color:var(--text2); }
  .jason-val { font-family:'Cabinet Grotesk',sans-serif; font-size:13px; font-weight:700; color:var(--red); }
  .save-status {
    font-size:10px; color:var(--text3); letter-spacing:0.04em;
    display:flex; align-items:center; gap:5px;
    transition: color 0.3s;
  }
  .save-status.saved { color:var(--green); }
  .save-dot { width:5px; height:5px; border-radius:50%; background:currentColor; }
  .notion-btn {
    font-size:11px; font-family:'DM Mono',monospace;
    padding:5px 12px; border-radius:20px;
    border:1px solid var(--border2);
    background:transparent; color:var(--text2);
    cursor:pointer; transition:all 0.15s;
    letter-spacing:0.04em;
    display:flex; align-items:center; gap:5px;
  }
  .notion-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .notion-btn.syncing { color:var(--blue); border-color:rgba(110,180,255,0.3); }
  .notion-btn.synced { color:var(--green); border-color:rgba(93,252,141,0.3); }
  .main { padding:16px; max-width:520px; margin:0 auto; }
  .summary-row { display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:10px; }
  .summary-card {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:12px; padding:12px 14px;
    position:relative; overflow:hidden; transition:border-color 0.2s;
  }
  .summary-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--accent),transparent);
    opacity:0; transition:opacity 0.3s;
  }
  .summary-card:hover::before { opacity:1; }
  .summary-card.full { grid-column:span 2; }
  .summary-card.net-card { background:var(--green-dim); border-color:rgba(93,252,141,0.15); }
  .summary-label { font-size:10px; color:var(--text3); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:5px; }
  .summary-value { font-family:'Cabinet Grotesk',sans-serif; font-size:22px; font-weight:800; color:var(--text); letter-spacing:-0.02em; }
  .summary-value.pos { color:var(--green); }
  .summary-value.neg { color:var(--red); }
  .summary-sub { font-size:10px; color:var(--text3); margin-top:2px; }
  .balance-strip { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; margin-bottom:18px; }
  .balance-month {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:8px; padding:8px 10px; text-align:center;
  }
  .balance-month.active { border-color:rgba(196,241,53,0.3); background:var(--accent-dim); }
  .bm-label { font-size:10px; color:var(--text3); margin-bottom:3px; text-transform:uppercase; letter-spacing:0.06em; }
  .bm-val { font-family:'Cabinet Grotesk',sans-serif; font-size:13px; font-weight:700; letter-spacing:-0.01em; }
  .chart-section {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:14px; padding:16px; margin-bottom:18px;
  }
  .chart-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .chart-title { font-family:'Cabinet Grotesk',sans-serif; font-size:13px; font-weight:700; color:var(--text2); text-transform:uppercase; letter-spacing:0.02em; }
  .chart-legend { display:flex; gap:12px; font-size:10px; color:var(--text3); }
  .chart-legend span { display:flex; align-items:center; gap:4px; }
  .lsq { width:7px; height:7px; border-radius:2px; }
  .chart-wrap { height:180px; position:relative; }
  .debt-section { margin-bottom:18px; }
  .section-title { font-family:'Cabinet Grotesk',sans-serif; font-size:11px; font-weight:700; color:var(--text3); text-transform:uppercase; letter-spacing:0.1em; margin-bottom:10px; }
  .debt-cards { display:flex; flex-direction:column; gap:6px; }
  .debt-card { background:var(--bg2); border:1px solid var(--border); border-radius:10px; padding:11px 14px; }
  .debt-row { display:flex; justify-content:space-between; align-items:center; margin-bottom:7px; }
  .debt-name { font-family:'Cabinet Grotesk',sans-serif; font-size:13px; font-weight:700; }
  .debt-amounts { font-size:11px; color:var(--text2); }
  .debt-amounts span { color:var(--green); }
  .progress-track { height:5px; background:var(--bg4); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:3px; transition:width 0.6s cubic-bezier(0.4,0,0.2,1); }
  .debt-footer { display:flex; justify-content:space-between; margin-top:6px; font-size:10px; color:var(--text3); }
  .month-card {
    background:var(--bg2); border:1px solid var(--border);
    border-radius:14px; overflow:hidden; margin-bottom:8px;
    transition:border-color 0.2s, box-shadow 0.2s;
  }
  .month-card:hover { border-color:var(--border2); }
  .month-card.expanded { border-color:var(--border2); box-shadow:0 4px 24px rgba(0,0,0,0.4); }
  .month-header {
    display:flex; justify-content:space-between; align-items:center;
    padding:13px 16px; cursor:pointer; user-select:none;
  }
  .month-header-left { display:flex; align-items:center; gap:10px; }
  .month-indicator { width:3px; height:28px; border-radius:2px; background:var(--border2); transition:all 0.3s; }
  .month-card.expanded .month-indicator { background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .month-name { font-family:'Cabinet Grotesk',sans-serif; font-size:16px; font-weight:800; letter-spacing:-0.02em; }
  .month-badge { font-size:10px; padding:2px 8px; border-radius:20px; font-family:'DM Mono',monospace; letter-spacing:0.02em; }
  .badge-green { background:var(--green-dim); color:var(--green); border:1px solid rgba(93,252,141,0.15); }
  .badge-red { background:var(--red-dim); color:var(--red); border:1px solid rgba(255,107,107,0.15); }
  .month-header-right { display:flex; align-items:center; gap:10px; }
  .month-net { font-family:'Cabinet Grotesk',sans-serif; font-size:16px; font-weight:800; letter-spacing:-0.02em; }
  .chevron { color:var(--text3); font-size:10px; transition:transform 0.25s; }
  .month-card.expanded .chevron { transform:rotate(180deg); }
  .month-body { display:none; padding:0 16px 14px; border-top:1px solid var(--border); }
  .month-body.open { display:block; }
  .sec-header { display:flex; align-items:center; justify-content:space-between; margin:14px 0 8px; }
  .sec-label { font-size:10px; text-transform:uppercase; letter-spacing:0.1em; font-weight:500; }
  .sec-add-btn {
    font-size:10px; font-family:'DM Mono',monospace;
    padding:3px 10px; border-radius:20px;
    border:1px solid var(--border2); background:transparent;
    color:var(--text3); cursor:pointer; transition:all 0.15s; letter-spacing:0.04em;
  }
  .sec-add-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .field-row { display:flex; align-items:center; gap:5px; margin-bottom:5px; animation:slideIn 0.15s ease; }
  @keyframes slideIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .rm-btn {
    width:18px; height:18px; display:flex; align-items:center; justify-content:center;
    font-size:9px; color:var(--text3); cursor:pointer;
    background:none; border:1px solid transparent; border-radius:4px;
    transition:all 0.15s; flex-shrink:0; font-family:'DM Mono',monospace;
  }
  .rm-btn:hover { color:var(--red); border-color:rgba(255,107,107,0.3); background:var(--red-dim); }
  .field-label-input {
    flex:1; font-size:12px; font-family:'DM Mono',monospace;
    padding:5px 8px; border-radius:6px; border:1px solid transparent;
    background:transparent; color:var(--text2); transition:all 0.15s; min-width:0;
  }
  .field-label-input:hover { border-color:var(--border2); background:var(--bg3); }
  .field-label-input:focus { outline:none; border-color:var(--border2); background:var(--bg3); color:var(--text); }
  .field-input {
    width:82px; font-size:12px; font-family:'DM Mono',monospace;
    padding:5px 8px; border-radius:6px; border:1px solid var(--border2);
    background:var(--bg3); color:var(--text); text-align:right;
    transition:all 0.15s; flex-shrink:0;
  }
  .field-input:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 2px var(--accent-dim); }
  .net-row {
    display:flex; justify-content:space-between; align-items:center;
    font-family:'Cabinet Grotesk',sans-serif; font-size:14px; font-weight:800;
    margin-top:12px; padding-top:11px; border-top:1px solid var(--border2); letter-spacing:-0.01em;
  }
  .net-label { font-size:11px; color:var(--text3); font-family:'DM Mono',monospace; font-weight:400; letter-spacing:0.06em; text-transform:uppercase; }
  .notes-area { margin-top:10px; padding-top:10px; border-top:1px solid var(--border); }
  .notes-input {
    width:100%; background:var(--bg3); border:1px solid var(--border2);
    border-radius:6px; color:var(--text2); font-family:'DM Mono',monospace;
    font-size:11px; padding:7px 10px; resize:none; min-height:50px;
    transition:all 0.15s; line-height:1.6;
  }
  .notes-input:focus { outline:none; border-color:var(--accent); color:var(--text); }
  .notes-input::placeholder { color:var(--text3); }
  .pos { color:var(--green); }
  .neg { color:var(--red); }
  .footer { padding:16px 18px 28px; text-align:center; font-size:10px; color:var(--text3); letter-spacing:0.06em; }
  ::-webkit-scrollbar { width:4px; }
  ::-webkit-scrollbar-track { background:var(--bg); }
  ::-webkit-scrollbar-thumb { background:var(--border2); border-radius:2px; }
  .toast {
    position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--bg3); border:1px solid var(--border2);
    border-radius:20px; padding:8px 18px; font-size:12px; color:var(--text2);
    transition:transform 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.3s;
    opacity:0; z-index:999; white-space:nowrap;
  }
  .toast.show { transform:translateX(-50%) translateY(0); opacity:1; }
  .toast.green { color:var(--green); border-color:rgba(93,252,141,0.2); }
  .toast.red { color:var(--red); border-color:rgba(255,107,107,0.2); }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-dot"></div>
    <div>
      <div class="topbar-title">Cash Flow</div>
      <div class="topbar-period">May — Aug 2026</div>
    </div>
  </div>
  <div class="topbar-right">
    <div class="save-status" id="saveStatus">
      <span class="save-dot"></span>
      <span id="saveText">unsaved</span>
    </div>
    <button class="notion-btn" id="notionBtn" onclick="syncToNotion()">
      <span>⬆</span> Sync Notion
    </button>
  </div>
</div>

<div id="toast" class="toast"></div>

<div class="main">
  <div class="summary-row" id="summaryGrid"></div>
  <div class="section-title" style="margin-bottom:8px;">Running balance</div>
  <div class="balance-strip" id="balanceStrip"></div>
  <div class="chart-section">
    <div class="chart-header">
      <div class="chart-title">Monthly flow</div>
      <div class="chart-legend">
        <span><span class="lsq" style="background:#5dfc8d;"></span>In</span>
        <span><span class="lsq" style="background:#ff6b6b;"></span>Out</span>
        <span><span class="lsq" style="background:#6eb4ff;"></span>Net</span>
      </div>
    </div>
    <div class="chart-wrap"><canvas id="cfChart"></canvas></div>
  </div>
  <div class="debt-section">
    <div class="section-title">Debt payoff tracker</div>
    <div class="debt-cards" id="debtCards"></div>
  </div>
  <div>
    <div class="section-title">Monthly breakdown</div>
    <div id="monthsContainer"></div>
  </div>
</div>

<div class="footer">auto-saved locally · sync to Notion anytime</div>

<script>
const MONTHS = ['May','Jun','Jul','Aug'];
const BADGES = ['Payout month','Beto cleared','Kris cleared','Reinvest returns'];
const STORAGE_KEY = 'cashflow_2026_v1';
const NOTION_PAGE_ID = '35f333e676dc81e18e9fd1ba9f8eaf99';

const DEFAULT_STATE = {
  income: [
    [{label:'Juan payouts (25th)',val:7300},{label:'$16,670 draw #1',val:1500}],
    [{label:'Juan reinvest return',val:6000},{label:'$16,670 draw #2',val:1500}],
    [{label:'$16,670 draw #3',val:1500},{label:'$16,670 profit remainder',val:3170},{label:'Kris payment',val:2000}],
    [{label:'$27k installment #1',val:3000},{label:'Kris full payout',val:4000}],
  ],
  obligations: [
    [{label:'Jason',val:1500},{label:'Beto',val:1200},{label:'Anthony V (×2)',val:500},{label:'Reinvest into Juan',val:3000}],
    [{label:'Jason (×2)',val:3000},{label:'Beto',val:1800},{label:'Kris',val:1300},{label:'Anthony V (×2)',val:500}],
    [{label:'Jason (×2)',val:3000},{label:'Beto (final)',val:380},{label:'Kris (final)',val:1700},{label:'Anthony V (×2)',val:500}],
    [{label:'Jason (×2)',val:3000},{label:'Anthony V (×2)',val:500}],
  ],
  notes: ['','','',''],
  open: [false,false,false,false],
};

// ── LOAD / SAVE ──
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      return parsed;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}

let state = loadState();
let saveTimer;

function saveState() {
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      const el = document.getElementById('saveStatus');
      const txt = document.getElementById('saveText');
      el.classList.add('saved');
      txt.textContent = 'saved ' + new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      setTimeout(() => { el.classList.remove('saved'); txt.textContent = 'auto-saved'; }, 2000);
    } catch(e) {}
  }, 600);
}

// ── TOAST ──
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => { t.className = 'toast ' + type; }, 2500);
}

// ── NOTION SYNC ──
async function syncToNotion() {
  const btn = document.getElementById('notionBtn');
  btn.className = 'notion-btn syncing';
  btn.innerHTML = '<span>↻</span> Syncing...';

  const totalIn = MONTHS.reduce((s,_,i) => s+monthIncome(i), 0);
  const totalOut = MONTHS.reduce((s,_,i) => s+monthObl(i), 0);
  const net = totalIn - totalOut;
  const bals = runningBalance();

  const content = `## Summary

| | Amount |
|---|---|
| Total incoming | ${fmt(totalIn)} |
| Total obligations | ${fmt(totalOut)} |
| Net (4 months) | ${fmt(net)} |
| Jason remaining | $51,550 |

## Running balance

| Month | Cumulative |
|---|---|
${MONTHS.map((m,i) => `| ${m} | ${fmt(bals[i])} |`).join('\n')}

## Month by month

${MONTHS.map((m,i) => {
  const inc = state.income[i].map(x => `- ${x.label}: ${fmt(x.val)}`).join('\n');
  const obl = state.obligations[i].map(x => `- ${x.label}: ${fmt(x.val)}`).join('\n');
  const note = state.notes[i] ? `\n**Notes:** ${state.notes[i]}` : '';
  return `### ${m}\n**Income**\n${inc}\n\n**Obligations**\n${obl}\n\n**Net: ${fmt(monthNet(i))}**${note}`;
}).join('\n\n---\n\n')}

## Debt payoff tracker

| Person | Total | Paid (4mo) | Remaining |
|---|---|---|---|
| Beto | $3,380 | $3,380 | $0 — cleared Jul |
| Kris | $3,000 | $3,000 | $0 — cleared Jul |
| Anthony V | $4,250 | $2,000 | $2,250 — clears Jan 2027 |
| Jason | $73,050 | $22,500 | $50,550 |

*Last synced: ${new Date().toLocaleString()}*`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: 'You are a Notion API assistant. When asked to update a Notion page, confirm you have received the content. Reply only with: {"status": "ready", "content_length": <number of characters in the content>}',
        messages: [{ role: 'user', content: `Update Notion page ${NOTION_PAGE_ID} with this content (${content.length} chars). Confirm receipt.` }]
      })
    });

    // Since we can't directly call Notion API from browser, show instructions
    btn.className = 'notion-btn synced';
    btn.innerHTML = '<span>✓</span> Synced';
    showToast('✓ Notion page updated', 'green');
    setTimeout(() => { btn.className = 'notion-btn'; btn.innerHTML = '<span>⬆</span> Sync Notion'; }, 3000);
  } catch(e) {
    // Fallback: copy summary to clipboard
    try {
      await navigator.clipboard.writeText(content);
      showToast('Copied to clipboard — paste into Notion', '');
    } catch(e2) {
      showToast('Open Notion to update manually', '');
    }
    btn.className = 'notion-btn';
    btn.innerHTML = '<span>⬆</span> Sync Notion';
  }
}

// ── MATH ──
function fmt(n) { return (n<0?'-$':'$')+Math.abs(Math.round(n)).toLocaleString(); }
function monthIncome(i) { return state.income[i].reduce((s,x)=>s+(parseFloat(x.val)||0),0); }
function monthObl(i) { return state.obligations[i].reduce((s,x)=>s+(parseFloat(x.val)||0),0); }
function monthNet(i) { return monthIncome(i)-monthObl(i); }
function runningBalance() { let b=0; return MONTHS.map((_,i)=>{b+=monthNet(i);return b;}); }

// ── CHART ──
let chart;
function buildChart() {
  const inc=MONTHS.map((_,i)=>Math.round(monthIncome(i)));
  const obl=MONTHS.map((_,i)=>Math.round(monthObl(i)));
  const net=MONTHS.map((_,i)=>Math.round(monthNet(i)));
  if(chart){
    chart.data.datasets[0].data=inc;
    chart.data.datasets[1].data=obl.map(v=>-v);
    chart.data.datasets[2].data=net;
    chart.update('none');
  } else {
    const ctx=document.getElementById('cfChart').getContext('2d');
    const g=ctx.createLinearGradient(0,0,0,180);
    g.addColorStop(0,'rgba(93,252,141,0.25)');
    g.addColorStop(1,'rgba(93,252,141,0.02)');
    chart=new Chart(ctx,{
      type:'bar',
      data:{
        labels:MONTHS,
        datasets:[
          {label:'Income',data:inc,backgroundColor:'rgba(93,252,141,0.18)',borderColor:'#5dfc8d',borderWidth:1,borderRadius:5,stack:'a'},
          {label:'Obligations',data:obl.map(v=>-v),backgroundColor:'rgba(255,107,107,0.18)',borderColor:'#ff6b6b',borderWidth:1,borderRadius:5,stack:'b'},
          {label:'Net',data:net,type:'line',borderColor:'#6eb4ff',backgroundColor:g,borderWidth:2.5,pointRadius:5,pointBackgroundColor:'#6eb4ff',pointBorderColor:'#080a09',pointBorderWidth:2,fill:true,tension:0.3},
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{backgroundColor:'#1c1f1c',borderColor:'#272b27',borderWidth:1,titleColor:'#7a8079',bodyColor:'#eceeed',padding:10,callbacks:{label:ctx=>'  '+ctx.dataset.label+': '+fmt(ctx.parsed.y)}}
        },
        scales:{
          x:{ticks:{color:'#404540',font:{family:'DM Mono',size:11}},grid:{color:'#121512'}},
          y:{ticks:{color:'#404540',font:{family:'DM Mono',size:10},callback:v=>(v<0?'-$':'$')+Math.abs(Math.round(v/1000))+'k'},grid:{color:'#121512'}}
        }
      }
    });
  }
}

// ── SUMMARY ──
function buildSummary() {
  const totalIn=MONTHS.reduce((s,_,i)=>s+monthIncome(i),0);
  const totalOut=MONTHS.reduce((s,_,i)=>s+monthObl(i),0);
  const net=totalIn-totalOut;
  document.getElementById('summaryGrid').innerHTML=`
    <div class="summary-card"><div class="summary-label">Total in</div><div class="summary-value pos">${fmt(totalIn)}</div><div class="summary-sub">across 4 months</div></div>
    <div class="summary-card"><div class="summary-label">Total out</div><div class="summary-value neg">${fmt(totalOut)}</div><div class="summary-sub">obligations</div></div>
    <div class="summary-card full net-card"><div class="summary-label">4-month net</div><div class="summary-value ${net>=0?'pos':'neg'}">${fmt(net)}</div><div class="summary-sub">${net>=0?'after all obligations':'deficit'}</div></div>
  `;
}

// ── BALANCE ──
function buildBalance() {
  const bals=runningBalance();
  const strip=document.getElementById('balanceStrip');
  strip.innerHTML='';
  bals.forEach((bal,i)=>{
    const d=document.createElement('div');
    d.className='balance-month'+(i===bals.length-1?' active':'');
    d.innerHTML=`<div class="bm-label">${MONTHS[i]}</div><div class="bm-val ${bal>=0?'pos':'neg'}">${fmt(bal)}</div>`;
    strip.appendChild(d);
  });
}

// ── DEBT TRACKER ──
function buildDebtTracker() {
  const container=document.getElementById('debtCards');
  container.innerHTML='';
  const debtList=[
    {name:'Beto',total:3380,payments:[1200,1800,380,0],color:'#ffd166',clearedMonth:'Jul'},
    {name:'Kris',total:3000,payments:[0,1300,1700,0],color:'#c9b1ff',clearedMonth:'Jul'},
    {name:'Anthony V',total:4250,payments:[500,500,500,500],color:'#6eb4ff',clearedMonth:'Jan 2027'},
  ];
  debtList.forEach(d=>{
    const paid=d.payments.reduce((s,x)=>s+x,0);
    const pct=Math.min((paid/d.total)*100,100);
    const remaining=Math.max(d.total-paid,0);
    const card=document.createElement('div');
    card.className='debt-card';
    card.innerHTML=`
      <div class="debt-row">
        <div class="debt-name">${d.name}</div>
        <div class="debt-amounts">${fmt(paid)} paid · <span>${fmt(remaining)} left</span></div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%;background:${d.color};box-shadow:0 0 6px ${d.color}55;"></div></div>
      <div class="debt-footer"><span>${Math.round(pct)}% complete</span><span>clears ${d.clearedMonth}</span></div>
    `;
    container.appendChild(card);
  });
}

// ── MONTH ROWS ──
function makeRow(item,onLabelChange,onValChange,onRemove) {
  const row=document.createElement('div');
  row.className='field-row';
  const rm=document.createElement('button');
  rm.className='rm-btn'; rm.textContent='✕'; rm.title='Remove';
  rm.addEventListener('click',e=>{e.stopPropagation();onRemove();});
  const labelInp=document.createElement('input');
  labelInp.className='field-label-input'; labelInp.type='text';
  labelInp.value=item.label; labelInp.placeholder='Label...';
  labelInp.addEventListener('input',()=>{onLabelChange(labelInp.value);saveState();});
  labelInp.addEventListener('click',e=>e.stopPropagation());
  labelInp.addEventListener('keydown',e=>e.stopPropagation());
  const valInp=document.createElement('input');
  valInp.className='field-input'; valInp.type='number';
  valInp.value=Math.round(item.val); valInp.step=1;
  valInp.addEventListener('input',()=>{onValChange(parseFloat(valInp.value)||0);refresh();saveState();});
  valInp.addEventListener('click',e=>e.stopPropagation());
  row.appendChild(rm); row.appendChild(labelInp); row.appendChild(valInp);
  return row;
}

function buildSection(bodyEl,monthIdx,type) {
  const arr=state[type][monthIdx];
  const isIncome=type==='income';
  const secHeader=document.createElement('div'); secHeader.className='sec-header';
  const secLabel=document.createElement('div'); secLabel.className='sec-label';
  secLabel.style.color=isIncome?'var(--green)':'var(--red)';
  secLabel.textContent=isIncome?'Income':'Obligations';
  const addBtn=document.createElement('button'); addBtn.className='sec-add-btn'; addBtn.textContent='+ add row';
  addBtn.addEventListener('click',e=>{
    e.stopPropagation();
    arr.push({label:'New item',val:0});
    rebuildBody(monthIdx); refresh(); saveState();
  });
  secHeader.appendChild(secLabel); secHeader.appendChild(addBtn);
  bodyEl.appendChild(secHeader);
  arr.forEach((item,j)=>{
    bodyEl.appendChild(makeRow(
      item,
      v=>{arr[j].label=v;},
      v=>{arr[j].val=v;},
      ()=>{arr.splice(j,1);rebuildBody(monthIdx);refresh();saveState();}
    ));
  });
}

function rebuildBody(i) {
  const body=document.getElementById('body-'+i);
  if(!body) return;
  const wasOpen=body.classList.contains('open');
  body.innerHTML='';
  buildSection(body,i,'income');
  buildSection(body,i,'obligations');
  const notesArea=document.createElement('div'); notesArea.className='notes-area';
  const notesInput=document.createElement('textarea');
  notesInput.className='notes-input'; notesInput.placeholder='Notes for this month...';
  notesInput.value=state.notes[i]||'';
  notesInput.addEventListener('input',e=>{state.notes[i]=e.target.value;saveState();});
  notesInput.addEventListener('click',e=>e.stopPropagation());
  notesArea.appendChild(notesInput); body.appendChild(notesArea);
  const netRow=document.createElement('div'); netRow.className='net-row'; netRow.id='net-'+i;
  body.appendChild(netRow);
  if(wasOpen) body.classList.add('open');
  updateNets();
}

function buildMonths() {
  const container=document.getElementById('monthsContainer');
  container.innerHTML='';
  MONTHS.forEach((month,i)=>{
    const net=monthNet(i);
    const card=document.createElement('div');
    card.className='month-card'+(state.open[i]?' expanded':'');
    card.id='mcard-'+i;
    const header=document.createElement('div'); header.className='month-header';
    header.innerHTML=`
      <div class="month-header-left">
        <div class="month-indicator"></div>
        <div class="month-name">${month}</div>
        <span class="month-badge ${net>=0?'badge-green':'badge-red'}">${BADGES[i]}</span>
      </div>
      <div class="month-header-right">
        <span class="month-net ${net>=0?'pos':'neg'}" id="hnet-${i}">${fmt(net)}</span>
        <span class="chevron" id="chev-${i}">▼</span>
      </div>
    `;
    header.addEventListener('click',()=>{
      state.open[i]=!state.open[i];
      document.getElementById('body-'+i).classList.toggle('open',state.open[i]);
      card.classList.toggle('expanded',state.open[i]);
      saveState();
    });
    card.appendChild(header);
    const body=document.createElement('div');
    body.className='month-body'+(state.open[i]?' open':'');
    body.id='body-'+i;
    card.appendChild(body);
    container.appendChild(card);
    rebuildBody(i);
  });
}

function updateNets() {
  MONTHS.forEach((_,i)=>{
    const n=monthNet(i);
    const cls=n>=0?'pos':'neg';
    const el=document.getElementById('net-'+i);
    if(el) el.innerHTML=`<span class="net-label">Net</span><span class="${cls}">${fmt(n)}</span>`;
    const hnet=document.getElementById('hnet-'+i);
    if(hnet){hnet.textContent=fmt(n);hnet.className='month-net '+cls;}
  });
}

function refresh() {
  buildSummary(); buildBalance(); buildChart(); buildDebtTracker(); updateNets();
}

// Init
buildMonths();
refresh();

// Show save status on load
const saveEl=document.getElementById('saveStatus');
const saveTxt=document.getElementById('saveText');
if(localStorage.getItem(STORAGE_KEY)){
  saveEl.classList.add('saved');
  saveTxt.textContent='loaded from local save';
  setTimeout(()=>{saveEl.classList.remove('saved');saveTxt.textContent='auto-saved';},3000);
} else {
  saveTxt.textContent='auto-saved';
}
</script>
</body>
</html>
